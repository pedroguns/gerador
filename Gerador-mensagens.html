
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Call Center</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: #fff;
}

/* ===== PAINEL ===== */
#panel {
    width: 100%;
    
    margin: 20px auto;

    background: #121212;
    color: #fff;

    padding: 10px;
    box-sizing: border-box;

    border-radius: 10px;

    overflow: auto;
}

/* ===== CAMPOS ===== */
input,
select,
textarea {
    width: 100%;
    margin: 4px 0;
    padding: 6px;

    background: #1e1e1e;
    color: #fff;

    border: 1px solid #333;
    border-radius: 5px;

    box-sizing: border-box;
}

/* ===== BOTÕES ===== */
button {
    margin: 3px 2px;
    padding: 6px;
    font-size: 12px;

    cursor: pointer;

    background: #2a2a2a;
    color: #fff;

    border: 1px solid #444;
    border-radius: 5px;
}

button:hover {
    background: #3a3a3a;
}

/* ===== BOTÕES 3 COLUNAS ===== */
#botoes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
}

#botoes button {
    width: 100%;
    min-width: 0;
    font-size: 11px;
    padding: 6px 4px;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ===== LISTA EXCLUIR ===== */
#listaExcluir {
    margin-top: 10px;
    padding: 8px;

    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 5px;
}
</style>
</head>

<body>

<div id="panel">

<h3>Cliente</h3>

<input id="nome" placeholder="Nome">
<input id="nomeCompleto" placeholder="Nome completo">
<input id="telefone" placeholder="Telefone">

<select id="tratamento">
    <option value="Sr.">Sr.</option>
    <option value="Sra.">Sra.</option>
    <option value="">Sem</option>
</select>

<button onclick="novoAtendimento()">🆕 Novo Atendimento</button>

<hr>

<h3>Scripts</h3>

<input id="btnNome" placeholder="Nome do botão">
<input id="btnMsg" placeholder="Mensagem do botão">

<button onclick="adicionarBotao()">➕ Adicionar Botão</button>
<button onclick="abrirListaExcluir()">🗑 Excluir Botão</button>

<div id="botoes"></div>

<hr>

<h3>Anotações</h3>

<button onclick="copiar()">📋 Copiar</button>
<button onclick="limpar()">🗑 Limpar</button>
<button onclick="nota()">🧾 Nota de Acatamento</button>

<textarea id="anotacoes" rows="6"></textarea>

</div>

<script>

/* ===== BOTÕES ===== */
let botoes = JSON.parse(localStorage.getItem("botoes")) || [
{
    nome: "Saudação",
    msg: "Bom dia {{tratamento}} {{nome}}, com quem eu falo por gentileza?"
}
];

function salvar() {
    localStorage.setItem("botoes", JSON.stringify(botoes));
}

/* ===== RENDER ===== */
function render() {
    let div = document.getElementById("botoes");
    div.innerHTML = "";

    botoes.forEach((b, index) => {

        let btn = document.createElement("button");
        btn.innerText = b.nome;

        btn.onclick = function () {

            let texto = b.msg
                .replaceAll("{{nome}}", document.getElementById("nome").value)
                .replaceAll("{{tratamento}}", document.getElementById("tratamento").value);

            navigator.clipboard.writeText(texto);
        };

        btn.oncontextmenu = function (e) {
            e.preventDefault();

            let novoNome = prompt("Nome:", b.nome);
            let novaMsg = prompt("Mensagem:", b.msg);

            if (novoNome !== null) botoes[index].nome = novoNome;
            if (novaMsg !== null) botoes[index].msg = novaMsg;

            salvar();
            render();
        };

        div.appendChild(btn);
    });
}

/* ===== ADICIONAR BOTÃO ===== */
function adicionarBotao() {
    let nome = document.getElementById("btnNome").value.trim();
    let msg = document.getElementById("btnMsg").value.trim();

    if (!nome || !msg) {
        alert("Preencha tudo");
        return;
    }

    botoes.push({ nome, msg });

    document.getElementById("btnNome").value = "";
    document.getElementById("btnMsg").value = "";

    salvar();
    render();
}

/* ===== EXCLUIR ===== */
function abrirListaExcluir() {

    let antiga = document.getElementById("listaExcluir");
    if (antiga) {
        antiga.remove();
        return;
    }

    let div = document.createElement("div");
    div.id = "listaExcluir";

    botoes.forEach((b, index) => {

        let btn = document.createElement("button");
        btn.innerText = "🗑 " + b.nome;
        btn.style.width = "100%";

        btn.onclick = function () {
            if (confirm("Excluir " + b.nome + "?")) {
                botoes.splice(index, 1);
                salvar();
                render();
                abrirListaExcluir();
            }
        };

        div.appendChild(btn);
    });

    document.getElementById("panel").appendChild(div);
}

/* ===== NOTA ACATAMENTO ===== */
function nota() {
    let t = document.getElementById("tratamento").value;
    let n = document.getElementById("nomeCompleto").value;
    let tel = document.getElementById("telefone").value;

    document.getElementById("anotacoes").value =
    `${t} ${n} tel: ${tel}`;
}

/* ===== COPIAR ===== */
function copiar() {
    navigator.clipboard.writeText(
        document.getElementById("anotacoes").value
    );
}

/* ===== LIMPAR ===== */
function limpar() {
    document.getElementById("anotacoes").value = "";
}

/* ===== NOVO ATENDIMENTO ===== */
function novoAtendimento() {
    document.getElementById("nome").value = "";
    document.getElementById("nomeCompleto").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("tratamento").selectedIndex = 2;
    document.getElementById("anotacoes").value = "";
    document.getElementById("nome").focus();
}

/* INIT */
render();

</script>

</body>
</html>
